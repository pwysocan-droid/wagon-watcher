name: digest

# Weekly digest. Sunday 16:00 UTC = 9am PDT / 8am PST. Runs digest.py
# which writes digest/<ISO-week>.md and digest/LATEST.md, then commits
# both. The LATEST.md path is the stable URL the user hands to Opus
# chats for the weekly review:
#   https://raw.githubusercontent.com/<owner>/<repo>/main/digest/LATEST.md

on:
  schedule:
    - cron: '0 16 * * 0'   # Sundays 16:00 UTC
  workflow_dispatch:

concurrency:
  group: digest
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install runtime dependencies
        run: pip install --quiet -r requirements.txt

      - name: Generate digest
        id: gen
        run: |
          MSG=$(python digest.py)
          echo "$MSG"

      - name: Configure git for self-commit
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Commit and push digest
        run: |
          ISO_WEEK=$(date -u +%G-W%V)
          git add digest/
          if git diff --cached --quiet; then
            echo "No digest changes to commit"
          else
            git commit -m "digest: $ISO_WEEK weekly summary"
            git pull --rebase --autostash origin main || true
            git push
          fi
